<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="background-color" content="#F8FAFC" />
    <title>VaxtaGo — AI помощник для мигрантов</title>
    <meta name="description" content="VaxtaGo: поиск работы, проверка работодателей, перевод документов, юридическая помощь и миграция." />
    <meta property="og:title" content="VaxtaGo — AI помощник для мигрантов" />
    <meta property="og:description" content="Один помощник для работы, документов и миграции." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://watkanjjfsvqbhebchpk.supabase.co" />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" /></noscript>
    <script src="https://telegram.org/js/telegram-web-app.js" async></script>
    <style>
      #boot-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #2563EB, #06B6D4);
        font-family: 'Inter', system-ui, sans-serif;
      }
      #boot-splash .logo {
        width: 80px; height: 80px; border-radius: 24px;
        background: rgba(255,255,255,0.2); backdrop-filter: blur(12px);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        animation: boot-pop 0.5s ease-out;
      }
      #boot-splash .logo span { font-size: 36px; font-weight: 900; color: #fff; }
      #boot-splash h1 { color: #fff; font-size: 24px; font-weight: 700; margin: 20px 0 8px; }
      #boot-splash p { color: rgba(255,255,255,0.8); font-size: 14px; margin: 0; text-align: center; padding: 0 32px; }
      #boot-splash .spinner {
        margin-top: 20px; width: 32px; height: 32px; border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-pop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <div class="logo"><span>V</span></div>
      <h1>VaxtaGo</h1>
      <p>AI помощник для работы и документов</p>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
